<div class="bar">
  <div class="bar__inner">
    <div class="bar__title">
      COMPARADOR DE PRODUCTOS
      <span class="bar__count">{{ instruments.length }}/2</span>
    </div>

    <div class="bar__slots">
      @for (slot of slots; track $index) {
        <div class="bar__slot">
          @if (slot) {
            @if (slot.imageUrl) {
              <img [src]="slot.imageUrl" [alt]="slot.name" class="bar__slot-img" />
            } @else {
              <div class="bar__slot-img bar__slot-img--placeholder">🎸</div>
            }
            <div class="bar__slot-info">
              <p class="bar__slot-name">{{ slot.name }}</p>
              <p class="bar__slot-price">€{{ slot.price }}</p>
            </div>
            <button class="bar__slot-remove" (click)="remove.emit(slot.id)">✕</button>
          } @else {
            <p class="bar__slot-empty">Añade más productos para comparar</p>
          }
        </div>
      }
    </div>

    <div class="bar__actions">
      <button class="bar__clear-btn" (click)="clear.emit()">LIMPIAR TODO</button>
      <button class="bar__compare-btn" [disabled]="instruments.length < 2" (click)="onCompare()">
        VER COMPARACIÓN DETALLADA
      </button>
    </div>
  </div>
</div>
